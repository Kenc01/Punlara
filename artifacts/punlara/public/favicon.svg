<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background in Punlara green -->
  <rect width="180" height="180" rx="36" fill="#1A5C2E"/>

  <!-- Stylized tree: layered canopy + trunk -->
  <!-- Bottom canopy layer -->
  <ellipse cx="90" cy="95" rx="52" ry="34" fill="#F4A726"/>
  <!-- Middle canopy layer -->
  <ellipse cx="90" cy="75" rx="42" ry="30" fill="white"/>
  <!-- Top canopy layer -->
  <ellipse cx="90" cy="57" rx="30" ry="24" fill="white" opacity="0.9"/>

  <!-- Trunk -->
  <rect x="82" y="115" width="16" height="28" rx="6" fill="white"/>

  <!-- Ground line / roots suggestion -->
  <rect x="62" y="140" width="56" height="6" rx="3" fill="#F4A726"/>
</svg>
